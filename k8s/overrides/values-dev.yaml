# C18 — Override env-common cho DEV (namespace: dev, nhánh: develop)
# develop → ns dev: môi trường tích hợp, hứng thay đổi sớm.

backend:
  image:
    tag: develop               # dev bám nhánh develop
    pullPolicy: Always          # tag mutable → luôn kéo bản mới nhất khi pod tạo lại
  serviceMonitor:
    enabled: false
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-type
                operator: In
                values: ["cloud"]

ui:
  image:
    tag: develop
    pullPolicy: Always
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-type
                operator: In
                values: ["cloud"]

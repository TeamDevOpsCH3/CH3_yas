# C12 — Override env-common cho BASELINE (namespace: yas, tag: main)
# Dùng chung cho MỌI service khi deploy vào ns yas (-f values-baseline.yaml).
# image.repository đặt PER-SERVICE lúc deploy (cd-deploy.sh / ArgoCD helm.parameters).
# 2 họ chart: Java/BFF/sampledata dùng key `backend.*`, 2 UI dùng key `ui.*`.

backend:
  image:
    tag: main                  # baseline = nhánh main (đã qua PR + CI)
    pullPolicy: IfNotPresent
  serviceMonitor:
    enabled: false             # cụm KHÔNG cài Prometheus Operator → tắt ServiceMonitor (đồ án bỏ observability)
  affinity:                    # ƯU TIÊN (mềm) chạy trên droplet cloud; KHÔNG ép cứng theo arch
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-type
                operator: In
                values: ["cloud"]

ui:
  image:
    tag: main
    pullPolicy: IfNotPresent
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-type
                operator: In
                values: ["cloud"]

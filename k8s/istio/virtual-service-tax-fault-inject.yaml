# DEMO-ONLY — fault injection to simulate 503 on tax service.
# Apply temporarily to capture EV-RETRY evidence, then delete immediately.
# Do NOT commit this file. Do NOT add to kustomization.yaml.
#
# Usage:
#   kubectl apply -f virtual-service-tax-fault-inject.yaml  # enable fault
#   # ... capture logs / screenshot ...
#   kubectl delete virtualservice tax-fault-inject -n dev   # disable fault
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: tax-fault-inject
  namespace: dev
spec:
  hosts:
    - tax
  http:
    - fault:
        abort:
          httpStatus: 503
          percentage:
            value: 100
      route:
        - destination:
            host: tax
            port:
              number: 8080

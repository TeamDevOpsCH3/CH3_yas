# =============================================================================
# appset-dev.yaml — ArgoCD ApplicationSet for env=dev (branch develop -> ns dev)
# Methyl CH3 — YAS CD (C22).
#
# Declarative equivalent of deploy-yas-applications.sh's bash loop:
#   list generator  == the SERVICES keep-list table
#   templatePatch   == the per-service `--set` overrides + `-f` value overlays
# NOTE: per-service params + the conditional on-prem value file are emitted via
# `templatePatch` (a Go-templated STRING rendered THEN parsed) because bare
# range/if cannot live in the structured `template` field (invalid raw YAML).
#
# ADOPT STAGED: sync is MANUAL here. Apply -> `argocd app diff` -> if clean,
# sync -> only then uncomment `automated:` (selfHeal + prune) and re-apply.
#
# RUN ON: worker-hiep WSL2   ->   kubectl apply -f k8s/argocd/appset-dev.yaml
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # ---- Backend Java services (image + DB suffix + Hikari pool) --------
          - service: product
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-product
              - name: backend.databaseName
                value: product_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: cart
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-cart
              - name: backend.databaseName
                value: cart_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: order
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-order
              - name: backend.databaseName
                value: order_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: customer
            onprem: true
            params:
              - name: backend.image.repository
                value: methylch3/yas-customer
              - name: backend.databaseName
                value: customer_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: inventory
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-inventory
              - name: backend.databaseName
                value: inventory_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: tax
            onprem: true
            params:
              - name: backend.image.repository
                value: methylch3/yas-tax
              - name: backend.databaseName
                value: tax_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: media
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-media
              - name: backend.databaseName
                value: media_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
              # Serve product/category images at api.dev.../media (matches publicUrl)
              - name: backend.ingress.host
                value: api.dev.yas.local.com
              # Cutover Option 1: api-gateway ôm /media trên api.dev -> tắt ingress
              # trực tiếp của media (gw reach media qua mТLS). initContainer /images giữ.
              - name: backend.ingress.enabled
                value: "false"
          - service: search
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-search
              - name: backend.databaseName
                value: search_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: sampledata
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-sampledata
              - name: backend.databaseName
                value: sampledata_dev
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          # ---- BFF services (image + ingress host, NO DB) --------------------
          - service: storefront-bff
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-storefront-bff
              - name: backend.ingress.host
                value: storefront.dev.yas.local.com
          - service: backoffice-bff
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-backoffice-bff
              - name: backend.ingress.host
                value: backoffice.dev.yas.local.com
          # ---- UI services (ui.image, NO DB, on-prem soft-affinity) ----------
          - service: storefront-ui
            onprem: true
            params:
              - name: ui.image.repository
                value: methylch3/yas-storefront
              # Browser-facing API base must match the per-env storefront host
              # (chart default lacks the .dev segment -> UI calls wrong domain).
              - name: ui.extraEnvs[0].name
                value: API_BASE_PATH
              - name: ui.extraEnvs[0].value
                value: http://storefront.dev.yas.local.com/api
          - service: backoffice-ui
            onprem: true
            params:
              - name: ui.image.repository
                value: methylch3/yas-backoffice
          # ---- swagger-ui (official image, top-level ingress, on-prem) -------
          - service: swagger-ui
            onprem: true
            params:
              - name: ingress.host
                value: api.dev.yas.local.com
              # OpenAPI spec URLs point at api.${domain} (browser-facing, per-env)
              - name: domain
                value: dev.yas.local.com
              # Cutover Option 1: api-gateway (in-mesh) ôm /swagger-ui trên api.dev
              # -> tắt ingress trực tiếp của swagger-ui (gw reach swagger qua mТLS).
              - name: ingress.enabled
                value: "false"
  template:
    metadata:
      name: 'yas-dev-{{ .service }}'
      labels:
        env: dev
        app.kubernetes.io/part-of: yas
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
  templatePatch: |
    spec:
      sources:
        - repoURL: https://github.com/TeamDevOpsCH3/CH3_yas
          targetRevision: develop
          ref: values
        - repoURL: https://github.com/TeamDevOpsCH3/CH3_yas
          targetRevision: develop
          path: k8s/charts/{{ .service }}
          helm:
            releaseName: {{ .service }}
            valueFiles:
              - $values/k8s/deploy/values-dev.yaml
              {{- if .onprem }}
              - $values/k8s/deploy/values-onprem.yaml
              {{- end }}
            parameters:
              {{- range .params }}
              - name: {{ .name }}
                value: "{{ .value }}"
                {{- if .forceString }}
                forceString: true
                {{- end }}
              {{- end }}

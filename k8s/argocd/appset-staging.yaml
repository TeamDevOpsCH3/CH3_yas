# =============================================================================
# appset-staging.yaml — ArgoCD ApplicationSet for env=staging
#                        (branch main -> ns staging). Methyl CH3 — YAS CD (C22).
#
# Promotion: develop --(PR + review)--> main --(ArgoCD auto-sync)--> ns staging.
# The PR-approval on `main` IS the promotion gate, so auto-sync on main is safe.
# Per-service params + conditional on-prem value file are emitted via templatePatch.
#
# PREREQUISITES (see README_C22.md) before applying:
#   1) ./deploy-yas-configuration.sh staging   (ns staging is empty -> needs configmaps)
#   2) >= 1 PR develop -> main merged           (main must contain charts + values + deps)
#   3) RAM headroom (staging full ~= +6-7GB on top of dev)
#
# RUN ON: worker-hiep WSL2   ->   kubectl apply -f k8s/argocd/appset-staging.yaml
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-staging
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # ---- Backend Java services (image + DB suffix + Hikari pool) --------
          - service: product
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-product
              - name: backend.databaseName
                value: product_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: cart
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-cart
              - name: backend.databaseName
                value: cart_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: order
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-order
              - name: backend.databaseName
                value: order_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: customer
            onprem: true
            params:
              - name: backend.image.repository
                value: methylch3/yas-customer
              - name: backend.databaseName
                value: customer_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: inventory
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-inventory
              - name: backend.databaseName
                value: inventory_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: tax
            onprem: true
            params:
              - name: backend.image.repository
                value: methylch3/yas-tax
              - name: backend.databaseName
                value: tax_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: media
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-media
              - name: backend.databaseName
                value: media_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
              # Serve product/category images at api.staging.../media (matches publicUrl)
              - name: backend.ingress.host
                value: api.staging.yas.local.com
          - service: search
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-search
              - name: backend.databaseName
                value: search_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          - service: sampledata
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-sampledata
              - name: backend.databaseName
                value: sampledata_staging
              - name: backend.extraEnvs[0].name
                value: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              - name: backend.extraEnvs[0].value
                value: "5"
                forceString: true
          # ---- BFF services (image + ingress host, NO DB) --------------------
          - service: storefront-bff
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-storefront-bff
              - name: backend.ingress.host
                value: storefront.staging.yas.local.com
          - service: backoffice-bff
            onprem: false
            params:
              - name: backend.image.repository
                value: methylch3/yas-backoffice-bff
              - name: backend.ingress.host
                value: backoffice.staging.yas.local.com
          # ---- UI services (ui.image, NO DB, on-prem soft-affinity) ----------
          - service: storefront-ui
            onprem: true
            params:
              - name: ui.image.repository
                value: methylch3/yas-storefront
              # Browser-facing API base must match the per-env storefront host.
              - name: ui.extraEnvs[0].name
                value: API_BASE_PATH
              - name: ui.extraEnvs[0].value
                value: http://storefront.staging.yas.local.com/api
          - service: backoffice-ui
            onprem: true
            params:
              - name: ui.image.repository
                value: methylch3/yas-backoffice
          # ---- swagger-ui (official image, top-level ingress, on-prem) -------
          - service: swagger-ui
            onprem: true
            params:
              - name: ingress.host
                value: api.staging.yas.local.com
  template:
    metadata:
      name: 'yas-staging-{{ .service }}'
      labels:
        env: staging
        app.kubernetes.io/part-of: yas
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: staging
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
  templatePatch: |
    spec:
      sources:
        - repoURL: https://github.com/TeamDevOpsCH3/CH3_yas
          targetRevision: main
          ref: values
        - repoURL: https://github.com/TeamDevOpsCH3/CH3_yas
          targetRevision: main
          path: k8s/charts/{{ .service }}
          helm:
            releaseName: {{ .service }}
            valueFiles:
              - $values/k8s/deploy/values-staging.yaml
              {{- if .onprem }}
              - $values/k8s/deploy/values-onprem.yaml
              {{- end }}
            parameters:
              {{- range .params }}
              - name: {{ .name }}
                value: "{{ .value }}"
                {{- if .forceString }}
                forceString: true
                {{- end }}
              {{- end }}

# =============================================================================
# /etc/dnsmasq.d/yas.conf
# DNS cho client nhóm qua Tailscale — resolve *.yas.local.com → master IP.
# Giải pháp: 1 người config (master + Tailscale Split DNS), cả nhóm (Win/Mac)
# tự resolve *.dev.yas.local.com mà KHÔNG sửa /etc/hosts từng máy.
#
# Cặp đôi với: Tailscale admin → DNS → Split DNS: yas.local.com → 100.98.171.67
# =============================================================================

# Wildcard: mọi subdomain .yas.local.com (storefront.dev / backoffice.dev /
# api.dev / .staging / baseline) → master IP (ingress-nginx nghe port 80 ở master).
address=/yas.local.com/100.98.171.67

# CHỈ nghe trên Tailscale IP — tránh đụng systemd-resolved (nghe loopback 127.0.0.53).
# Master vẫn resolve DNS bình thường qua systemd-resolved (pull image không ảnh hưởng).
listen-address=100.98.171.67
bind-interfaces

# Không đọc /etc/resolv.conf (tránh loop với systemd-resolved), tự forward
# domain khác lên DNS công cộng.
no-resolv
server=8.8.8.8
server=1.1.1.1

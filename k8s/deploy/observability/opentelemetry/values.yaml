# =============================================================================
# opentelemetry/values.yaml — OTel Collector (traces only) for YAS. Methyl CH3 — C30.
#
# WHY CHANGED FROM UPSTREAM:
#   - The collector image is opentelemetry-collector-k8s (0.153.0), a MINIMAL
#     distribution that does NOT ship the `loki` receiver/exporter. Upstream
#     config used receivers.loki + exporters.loki -> collector crash-looped:
#       "'receivers' unknown type: loki ... 'exporters' unknown type: loki".
#   - Logs already reach Loki directly via the Promtail DaemonSet, so the
#     collector's loki logs-pipeline was redundant. Removed it.
#   - Kept ONLY the traces pipeline: app --OTLP--> collector --otlphttp--> tempo.
#     This is exactly what C30 needs for the Tempo distributed-trace screenshot.
#   - Replaced deprecated `logging` exporter with `debug` (same purpose, current name).
# =============================================================================
opentelemetryCollectorConfig:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  exporters:
    debug:
      verbosity: detailed
    otlphttp:
      endpoint: http://tempo:4318
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp]

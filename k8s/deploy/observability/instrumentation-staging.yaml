# =============================================================================
# instrumentation-staging.yaml — OTel Operator Instrumentation CR for ns staging.
# Song song instrumentation.yaml (ns dev). C30 (P2). Methyl CH3.
#
# OTel Operator watch CR này + pod annotated `instrumentation.opentelemetry.io/
# inject-java: "true"` (backend chart, values-staging.yaml) -> inject initContainer
# thả OTel Java agent + JAVA_TOOL_OPTIONS(-javaagent) + OTEL_* env trỏ collector.
# Không rebuild image, không dependency in-app -> javaagent JDBC spans + jvm_* metrics.
#
# APPLY ON: kubectl apply -f instrumentation-staging.yaml
# (infra resource, KHÔNG ArgoCD-managed; version trong repo cho DR.)
# =============================================================================
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: yas-java
  namespace: staging
spec:
  exporter:
    # OTLP HTTP endpoint của collector (cross-ns từ staging, cùng cái dev dùng).
    endpoint: http://opentelemetry-collector.observability:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_always_on      # sample everything (probability 1)
  java:
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: http/protobuf          # match the :4318 HTTP receiver

# Prometheus datasource — THIẾU trong chart gốc (chỉ có loki+tempo) nhưng dashboard
# 4701 (JVM) + 6083 (HikariCP) cần DS_PROMETHEUS. name/uid = "prometheus" để khớp:
#   - dashboards.yaml: datasources[].datasourceName: prometheus
#   - tempo-datasource.yaml: jsonData.serviceMap.datasourceUid: prometheus
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    isDefault: true
    url: http://prometheus-kube-prometheus-prometheus.observability:9090
    jsonData:
      httpMethod: POST

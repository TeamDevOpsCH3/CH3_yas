# YAS OTel-native custom dashboard (nhom build) - provision declarative qua GrafanaDashboard.
# 7 nhom / query metric OTel semconv CO THAT. Datasource uid=prometheus.
# Bien: namespace (k8s_namespace_name, dev/staging) + application (label "Service").
# Grafana legend tokens duoc escape cho Helm (render ra literal).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: otel-app-dashboard
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  resyncPeriod: 5m
  json: |
    {
      "title": "YAS OTel Observability",
      "uid": "yas-otel-app",
      "schemaVersion": 37,
      "version": 1,
      "editable": true,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "refresh": "30s",
      "tags": [
        "yas",
        "otel"
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "label": "Namespace",
            "query": {
              "query": "label_values(jvm_memory_used_bytes, k8s_namespace_name)",
              "refId": "A"
            },
            "refresh": 2,
            "includeAll": false,
            "multi": false,
            "current": {
              "text": "dev",
              "value": "dev"
            }
          },
          {
            "name": "application",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "label": "Service",
            "query": {
              "query": "label_values(jvm_memory_used_bytes{k8s_namespace_name=\"$namespace\"}, application)",
              "refId": "A"
            },
            "refresh": 2,
            "includeAll": false,
            "multi": false,
            "current": {
              "text": "product",
              "value": "product"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Http Request",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Request rate (req/s) by route",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "id": 2,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_request_duration_seconds_count{application=\"$application\",k8s_namespace_name=\"$namespace\"}[5m])) by (http_route)",
              "legendFormat": "{{"{{"}}http_route{{"}}"}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "p95 latency (s) by route",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "id": 3,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{application=\"$application\",k8s_namespace_name=\"$namespace\"}[5m])) by (le, http_route))",
              "legendFormat": "p95 {{"{{"}}http_route{{"}}"}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP 5xx error ratio",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "id": 4,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_request_duration_seconds_count{application=\"$application\",k8s_namespace_name=\"$namespace\",http_response_status_code=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_request_duration_seconds_count{application=\"$application\",k8s_namespace_name=\"$namespace\"}[5m])),1)",
              "legendFormat": "5xx ratio",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP client request rate",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "id": 5,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_client_request_duration_seconds_count{application=\"$application\",k8s_namespace_name=\"$namespace\"}[5m]))",
              "legendFormat": "client req/s",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "ClassLoading",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 17

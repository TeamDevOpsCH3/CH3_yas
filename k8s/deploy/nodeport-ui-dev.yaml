# C15 — Expose 2 UI ra ngoài bằng NodePort CỐ ĐỊNH, ĐỘC LẬP Helm.
#
# Vì sao tách service riêng (không set service.type trong chart):
#   • Chart `ui` không có field `nodePort` → set qua chart chỉ ra cổng RANDOM.
#   • Quan trọng hơn: service do Helm quản → mỗi lần `helm upgrade` mà override không khai
#     type=NodePort thì service bị reset về ClusterIP → MẤT expose (đúng sự cố đã gặp).
#   • Service riêng này Helm KHÔNG đụng tới → cổng cố định, deploy lại bao nhiêu lần cũng còn.
#
# Truy cập qua Tailscale IP của BẤT KỲ node nào (NodePort mở trên mọi node), vd master:
#   • storefront (dev): http://100.98.171.67:30090
#   • backoffice (trang admin):     http://100.98.171.67:30091
#
# Áp dụng: kubectl apply -f nodeport-ui.yaml   (chỉ cần 1 lần; tồn tại độc lập với cd-deploy.sh)
# Lưu ý: nodePort là TÀI NGUYÊN TOÀN CỤM → nếu sau này expose UI của ns dev/staging
#        thì phải dùng cổng KHÁC (vd 30090/30091 cho dev, 30100/30101 cho staging).
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-ui-nodeport
  namespace: dev
  labels:
    app.kubernetes.io/part-of: yas
    yas.expose: nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: storefront-ui
    app.kubernetes.io/instance: storefront-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30090
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-ui-nodeport
  namespace: dev
  labels:
    app.kubernetes.io/part-of: yas
    yas.expose: nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: backoffice-ui
    app.kubernetes.io/instance: backoffice-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30091
---
# swagger-ui (API docs) — chart riêng, container port 8080
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui-nodeport
  namespace: dev
  labels:
    app.kubernetes.io/part-of: yas
    yas.expose: nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: swagger-ui
    app.kubernetes.io/instance: swagger-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30092

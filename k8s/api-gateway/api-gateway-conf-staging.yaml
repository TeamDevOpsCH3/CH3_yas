# =============================================================================
# api-gateway nginx config — ns STAGING. Song song configmap.yaml (ns dev).
# Y HỆT dev nhưng đổi MỌI service FQDN sang ns staging (*.staging.svc.cluster.local)
# cho proxy_pass + Host header + namespace: staging.
#
# Vì sao 2 file riêng (không template hóa): đây là nginx.conf trong configmap,
# template Helm/kustomize phức tạp; 2 file hardcode rõ ràng, dễ kiểm.
#
# proxy_http_version 1.1 (nginx mặc định HTTP/1.0 -> Istio sniffing sai -> passthrough
# plaintext -> backend STRICT reset). HTTP/1.1 -> Envoy route HTTP -> originate mTLS
# -> backend giữ STRICT, KHÔNG cần PERMISSIVE. proxy_pass TĨNH (FQDN, không resolver).
#
# Áp: kubectl apply -f k8s/api-gateway/api-gateway-conf-staging.yaml
#     kubectl -n staging rollout restart deploy/api-gateway
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-conf
  namespace: staging
data:
  default.conf: |
    server {
      listen 8080;
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # --- Swagger UI (gw ôm luôn để cutover thành api-gateway duy nhất) ---
      location /swagger-ui/ {
        proxy_set_header Host swagger-ui.staging.svc.cluster.local;
        proxy_pass http://swagger-ui.staging.svc.cluster.local:8080;
      }

      # --- Media (ảnh + spec) ---
      location /media/ {
        proxy_set_header Host media.staging.svc.cluster.local;
        proxy_pass http://media.staging.svc.cluster.local:80;
      }

      # --- 8 backend: spec /<svc>/v3/api-docs + "Try it out" /<svc>/** ---
      # (nếu staging thiếu service nào -> xoá block đó, nếu không nginx [emerg] crash.)
      location /product/ {
        proxy_set_header Host product.staging.svc.cluster.local;
        proxy_pass http://product.staging.svc.cluster.local:80;
      }
      location /cart/ {
        proxy_set_header Host cart.staging.svc.cluster.local;
        proxy_pass http://cart.staging.svc.cluster.local:80;
      }
      location /order/ {
        proxy_set_header Host order.staging.svc.cluster.local;
        proxy_pass http://order.staging.svc.cluster.local:80;
      }
      location /customer/ {
        proxy_set_header Host customer.staging.svc.cluster.local;
        proxy_pass http://customer.staging.svc.cluster.local:80;
      }
      location /inventory/ {
        proxy_set_header Host inventory.staging.svc.cluster.local;
        proxy_pass http://inventory.staging.svc.cluster.local:80;
      }
      location /tax/ {
        proxy_set_header Host tax.staging.svc.cluster.local;
        proxy_pass http://tax.staging.svc.cluster.local:80;
      }
      location /search/ {
        proxy_set_header Host search.staging.svc.cluster.local;
        proxy_pass http://search.staging.svc.cluster.local:80;
      }
    }
